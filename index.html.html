function atualizarRelatorioEquipe() {
    const obra = getObraAtiva();
    if (!obra) return;
    
    const funcionarios = getFuncionarios();
    const periodo = document.getElementById('filtro-periodo-equipe')?.value || 'mensal';
    const funcFiltro = document.getElementById('filtro-funcionario-equipe')?.value || 'TODOS';
    
    filtroEquipePeriodo = periodo;
    filtroEquipeFuncionario = funcFiltro;
    
    // Calcular datas do período
    const agora = new Date();
    let dataInicio, dataFim;
    
    if (periodo === 'personalizado') {
        dataInicio = document.getElementById('data-inicio-equipe')?.value ? new Date(document.getElementById('data-inicio-equipe').value) : new Date(agora.getFullYear(), agora.getMonth(), 1);
        dataFim = document.getElementById('data-fim-equipe')?.value ? new Date(document.getElementById('data-fim-equipe').value + 'T23:59:59') : agora;
    } else if (periodo === 'diario') {
        dataInicio = new Date(agora.getFullYear(), agora.getMonth(), agora.getDate());
        dataFim = agora;
    } else if (periodo === 'semanal') {
        const diaSemana = agora.getDay();
        dataInicio = new Date(agora);
        dataInicio.setDate(agora.getDate() - diaSemana);
        dataInicio.setHours(0, 0, 0, 0);
        dataFim = agora;
    } else { // mensal
        dataInicio = new Date(agora.getFullYear(), agora.getMonth(), 1);
        dataFim = agora;
    }
    
    // Coletar registros de produção
    const registros = [];
    obra.pecas.forEach(p => {
        if (p.producaoEquipe && Array.isArray(p.producaoEquipe)) {
            p.producaoEquipe.forEach(reg => {
                const dataReg = new Date(reg.data);
                if (dataReg >= dataInicio && dataReg <= dataFim) {
                    if (funcFiltro === 'TODOS' || reg.funcionarioId == funcFiltro) {
                        const func = funcionarios.find(f => f.id == reg.funcionarioId);
                        registros.push({
                            ...reg,
                            peca: p,
                            funcionarioNome: func?.nome || 'Desconhecido',
                            funcionarioFuncao: func?.funcao || 'outros'
                        });
                    }
                }
            });
        }
    });
    
    // Ordenar por data desc
    registros.sort((a, b) => new Date(b.data) - new Date(a.data));
    
    // Calcular totais
    const totalPecas = registros.reduce((a, r) => a + (r.qtd || 1), 0);
    const totalPeso = registros.reduce((a, r) => a + ((r.peca.peso || 0) * (r.qtd || 1) / (r.peca.qtd || 1)), 0);
    const funcionariosUnicos = [...new Set(registros.map(r => r.funcionarioId))].length;
    
    // Agrupar por funcionário para gráfico
    const producaoPorFunc = {};
    funcionarios.forEach(f => {
        producaoPorFunc[f.id] = { nome: f.nome, peso: 0, pecas: 0, funcao: f.funcao };
    });
    registros.forEach(r => {
        if (producaoPorFunc[r.funcionarioId]) {
            producaoPorFunc[r.funcionarioId].peso += (r.peca.peso || 0) * (r.qtd || 1) / (r.peca.qtd || 1);
            producaoPorFunc[r.funcionarioId].pecas += (r.qtd || 1);
        }
    });
    
    // Resumo
    const resumoDiv = document.getElementById('resumo-equipe');
    if (resumoDiv) {
        resumoDiv.innerHTML = `
            <div class="bg-slate-800/50 rounded-xl p-4 border border-slate-700 text-center">
                <p class="text-3xl font-bold text-blue-400">${totalPecas}</p>
                <p class="text-xs text-slate-400">Peças Produzidas</p>
            </div>
            <div class="bg-slate-800/50 rounded-xl p-4 border border-slate-700 text-center">
                <p class="text-3xl font-bold text-emerald-400">${formatPeso(totalPeso)}</p>
                <p class="text-xs text-slate-400">Peso Total</p>
            </div>
            <div class="bg-slate-800/50 rounded-xl p-4 border border-slate-700 text-center">
                <p class="text-3xl font-bold text-amber-400">${registros.length}</p>
                <p class="text-xs text-slate-400">Registros</p>
            </div>
            <div class="bg-slate-800/50 rounded-xl p-4 border border-slate-700 text-center">
                <p class="text-3xl font-bold text-purple-400">${funcionariosUnicos}</p>
                <p class="text-xs text-slate-400">Funcionários Ativos</p>
            </div>
        `;
    }
    
    // Gráfico
    const ctx = document.getElementById('chart-equipe')?.getContext('2d');
    if (ctx) {
        if (charts.equipe) charts.equipe.destroy();
        
        const dados = Object.values(producaoPorFunc).filter(p => p.peso > 0);
        dados.sort((a, b) => b.peso - a.peso);
        
        charts.equipe = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: dados.map(d => d.nome),
                datasets: [{
                    label: 'Peso (kg)',
                    data: dados.map(d => d.peso),
                    backgroundColor: dados.map(d => getFuncaoInfo(d.funcao).cor + '80'),
                    borderColor: dados.map(d => getFuncaoInfo(d.funcao).cor),
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                    x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                }
            }
        });
    }
    
    // Tabela
    const tbody = document.getElementById('tabela-producao-equipe');
    if (tbody) {
        tbody.innerHTML = registros.length === 0 ? `
            <tr><td colspan="7" class="py-8 text-center text-slate-500">Nenhum registro de produção no período</td></tr>
        ` : registros.slice(0, 100).map(r => {
            const funcaoInfo = getFuncaoInfo(r.funcionarioFuncao);
            const procInfo = getProcessoInfo(r.processo);
            return `
                <tr class="border-t border-slate-700/50 hover:bg-slate-800/50">
                    <td class="py-2 px-3 text-slate-300">${new Date(r.data).toLocaleString('pt-BR')}</td>
                    <td class="py-2 px-3 font-medium">${r.funcionarioNome}</td>
                    <td class="py-2 px-3">
                        <span class="px-2 py-0.5 rounded text-xs" style="background:${funcaoInfo.cor}30;color:${funcaoInfo.cor}">
                            ${funcaoInfo.nome}
                        </span>
                    </td>
                    <td class="py-2 px-3 font-mono">${r.peca.marca}</td>
                    <td class="py-2 px-3">
                        <span class="px-2 py-0.5 rounded text-xs" style="background:${procInfo.cor}30;color:${procInfo.cor}">
                            ${procInfo.icon} ${procInfo.nome}
                        </span>
                    </td>
                    <td class="py-2 px-3 text-center">${r.qtd || 1}</td>
                    <td class="py-2 px-3 text-right">${formatPeso((r.peca.peso || 0) * (r.qtd || 1) / (r.peca.qtd || 1))}</td>
                </tr>
            `;
        }).join('');
    }
}

function filtrarTabelaAtribuicao() {
    const obra = getObraAtiva();
    if (!obra) return;
    
    const funcionarios = getFuncionarios();
    const busca = (document.getElementById('busca-atrib')?.value || '').toLowerCase();
    const catFiltro = document.getElementById('filtro-cat-atrib')?.value || 'TODAS';
    const procFiltro = document.getElementById('filtro-proc-atrib')?.value || 'TODOS';
    
    let pecas = obra.pecas.filter(p => {
        if (catFiltro !== 'TODAS' && p.categoria !== catFiltro) return false;
        if (procFiltro !== 'TODOS' && p.processo !== procFiltro) return false;
        if (busca && !p.marca.toLowerCase().includes(busca) && !p.tipo.toLowerCase().includes(busca)) return false;
        return true;
    });
    
    const tbody = document.getElementById('tabela-atribuicao');
    if (!tbody) return;
    
    tbody.innerHTML = pecas.slice(0, 200).map(p => {
        const catInfo = getCategoriaInfo(p.categoria);
        const procInfo = getProcessoInfo(p.processo);
        
        // Pegar último responsável
        let ultimoResp = '-';
        if (p.producaoEquipe && p.producaoEquipe.length > 0) {
            const ultimo = p.producaoEquipe[p.producaoEquipe.length - 1];
            const func = funcionarios.find(f => f.id == ultimo.funcionarioId);
            ultimoResp = func ? func.nome : '-';
        }
        
        return `
            <tr class="border-t border-slate-700/50 hover:bg-slate-800/50">
                <td class="py-2 px-3">
                    <input type="checkbox" class="atrib-check rounded" data-id="${p.id}"/>
                </td>
                <td class="py-2 px-3 font-mono font-bold">${p.marca}</td>
                <td class="py-2 px-3 text-slate-300">${p.tipo}</td>
                <td class="py-2 px-3">
                    <span class="px-2 py-0.5 rounded text-xs" style="background:${catInfo.cor}30;color:${catInfo.cor}">
                        ${p.categoria}
                    </span>
                </td>
                <td class="py-2 px-3 text-center">${p.qtd}</td>
                <td class="py-2 px-3 text-right">${formatPeso(p.peso)}</td>
                <td class="py-2 px-3 text-center">
                    <span class="px-2 py-0.5 rounded-full text-xs" style="background:${procInfo.cor}30;color:${procInfo.cor}">
                        ${procInfo.icon} ${procInfo.nome}
                    </span>
                </td>
                <td class="py-2 px-3 text-center text-slate-400">${ultimoResp}</td>
            </tr>
        `;
    }).join('');
}

function toggleAllAtrib(checked) {

function atribuirProducaoSelecionadas() {
    const funcionarioId = document.getElementById('atrib-funcionario')?.value;
    const processo = document.getElementById('atrib-processo')?.value;
    const data = document.getElementById('atrib-data')?.value;
    
    if (!funcionarioId || !processo) {
        alert('Selecione o funcionário e o processo!');
        return;
    }
    
    const checks = document.querySelectorAll('.atrib-check:checked');
    if (checks.length === 0) {
        alert('Selecione pelo menos uma peça!');
        return;
    }
    
    const db = getDB();
    const obra = getObraAtiva();
    if (!obra) return;
    
    const obraIdx = db.obras.findIndex(o => o.id === obra.id);
    
    let count = 0;
    checks.forEach(cb => {
        const pecaId = parseInt(cb.dataset.id);
        const peca = db.obras[obraIdx].pecas.find(p => p.id === pecaId);
        if (peca) {
            // Inicializar array se não existir
            if (!peca.producaoEquipe) peca.producaoEquipe = [];
            
            // Adicionar registro
            peca.producaoEquipe.push({
                funcionarioId: parseInt(funcionarioId),
                processo: processo,
                data: data ? new Date(data).toISOString() : new Date().toISOString(),
                qtd: peca.qtd
            });
            
            // Atualizar processo da peça
            peca.processo = processo;
            
            // Atualizar histórico
            if (!peca.historico) peca.historico = [];
            peca.historico.push({ processo, data: new Date().toISOString() });
            
            // Atualizar fabricados/enviados
            if (processo === 'EXPEDIDO') {
                peca.enviados = peca.qtd;
                peca.fabricados = peca.qtd;
            } else if (['PINTURA', 'SOLDA'].includes(processo)) {
                peca.fabricados = peca.qtd;
            }
            
            count++;
        }
    });
    
    saveDB(db);
    
    const func = getFuncionarios().find(f => f.id == funcionarioId);
    alert(`✅ ${count} peças atribuídas para ${func?.nome || 'funcionário'}!`);
    
    filtrarTabelaAtribuicao();
}

function calcularProducaoFuncionario(funcionarioId) {
    const db = getDB();
    const agora = new Date();
    const inicioHoje = new Date(agora.getFullYear(), agora.getMonth(), agora.getDate());
    const inicioMes = new Date(agora.getFullYear(), agora.getMonth(), 1);
    
    let pecasHoje = 0, pecasMes = 0, pesoMes = 0;
    
    db.obras.forEach(obra => {
        obra.pecas.forEach(p => {
            if (p.producaoEquipe && Array.isArray(p.producaoEquipe)) {
                p.producaoEquipe.forEach(reg => {
                    if (reg.funcionarioId == funcionarioId) {
                        const dataReg = new Date(reg.data);
                        if (dataReg >= inicioHoje) {
                            pecasHoje += (reg.qtd || 1);
                        }
                        if (dataReg >= inicioMes) {
                            pecasMes += (reg.qtd || 1);
                            pesoMes += ((p.peso || 0) * (reg.qtd || 1) / (p.qtd || 1));
                        }
                    }
                });
            }
        });
    });
    
    return { pecasHoje, pecasMes, pesoMes };
}

}

function fecharModalFuncionario() {
    const modal = document.getElementById('modal-funcionario');
    if (modal) modal.remove();
}

function salvarFuncionario(id) {
    const nome = document.getElementById('func-nome')?.value.trim();
    const funcao = document.getElementById('func-funcao')?.value;
    
    if (!nome) {
        alert('Informe o nome do funcionário!');
        return;
    }
    
    const funcionarios = getFuncionarios();
    
    if (id) {
        // Editar
        const idx = funcionarios.findIndex(f => f.id === id);
        if (idx >= 0) {
            funcionarios[idx].nome = nome;
            funcionarios[idx].funcao = funcao;
        }
    } else {
        // Novo
        funcionarios.push({
            id: Date.now(),
            nome,
            funcao
        });
    }
    
    saveFuncionarios(funcionarios);
    fecharModalFuncionario();
    renderEquipesTab('funcionarios');
}

function editarFuncionario(id) {
    abrirModalFuncionario(id);
}

function excluirFuncionario(id) {
    if (!confirm('Excluir este funcionário? Os registros de produção serão mantidos.')) return;
    
    const funcionarios = getFuncionarios().filter(f => f.id !== id);
    saveFuncionarios(funcionarios);
    renderEquipesTab('funcionarios');
}

function exportarRelatorioEquipe() {
    const obra = getObraAtiva();
    if (!obra) return;
    
    const periodo = document.getElementById('filtro-periodo-equipe')?.value || 'mensal';
    const funcionarios = getFuncionarios();
    
    // Calcular datas
    const agora = new Date();
    let dataInicio, dataFim, periodoNome;
    
    if (periodo === 'diario') {
        dataInicio = new Date(agora.getFullYear(), agora.getMonth(), agora.getDate());
        dataFim = agora;
        periodoNome = 'Hoje';
    } else if (periodo === 'semanal') {
        const diaSemana = agora.getDay();
        dataInicio = new Date(agora);
        dataInicio.setDate(agora.getDate() - diaSemana);
        dataInicio.setHours(0, 0, 0, 0);
        dataFim = agora;
        periodoNome = 'Semana';
    } else {
        dataInicio = new Date(agora.getFullYear(), agora.getMonth(), 1);
        dataFim = agora;
        periodoNome = 'Mês';
    }
    
    // Coletar dados
    const dados = [];
    obra.pecas.forEach(p => {
        if (p.producaoEquipe && Array.isArray(p.producaoEquipe)) {
            p.producaoEquipe.forEach(reg => {
                const dataReg = new Date(reg.data);
                if (dataReg >= dataInicio && dataReg <= dataFim) {
                    const func = funcionarios.find(f => f.id == reg.funcionarioId);
                    dados.push({
                        'Data': new Date(reg.data).toLocaleString('pt-BR'),
                        'Funcionário': func?.nome || 'Desconhecido',
                        'Função': getFuncaoInfo(func?.funcao).nome,
                        'Marca': p.marca,
                        'Tipo': p.tipo,
                        'Processo': reg.processo,
                        'Qtd': reg.qtd || 1,
                        'Peso (kg)': ((p.peso || 0) * (reg.qtd || 1) / (p.qtd || 1)).toFixed(2)
                    });
                }
            });
        }
    });
    
    if (dados.length === 0) {
        alert('Nenhum registro para exportar!');
        return;
    }
    
    // Exportar Excel
    const ws = XLSX.utils.json_to_sheet(dados);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Produção');
    XLSX.writeFile(wb, `producao_equipe_${obra.codigo || 'obra'}_${periodoNome.toLowerCase()}.xlsx`);
}

function exportarPDF(tipo) {
    const obra = getObraAtiva();
    if (!obra) return;
    
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    doc.setFontSize(16);
    doc.text(tipo || 'Relatório de Produção', 14, 15);
    doc.setFontSize(10);
    doc.setTextColor(100);
    doc.text(`${obra.nome} | ${obra.cliente} | ${new Date().toLocaleDateString('pt-BR')}`, 14, 22);
    
    const resumo = calcularResumo(obra.pecas);
    const totais = calcularTotais(obra.pecas);
    const pesoTotal = obra.pecas.reduce((a, p) => a + (p.peso || 0), 0);
    
    doc.autoTable({
        startY: 30,
        head: [['Categoria', 'Qtd', 'Peso', '% Peso', 'Expedidos']],
        body: resumo.map(r => [
            r.categoria,
            r.total,
            `${(r.peso/1000).toFixed(2)}t`,
            `${(r.peso/pesoTotal*100).toFixed(1)}%`,
            r.porProcesso['EXPEDIDO'] || 0
        ]),
        foot: [['TOTAL', totais.total, `${(pesoTotal/1000).toFixed(2)}t`, '100%', totais.porProcesso['EXPEDIDO'] || 0]],
        theme: 'striped',
        headStyles: { fillColor: [59, 130, 246] }
    });
    
    doc.autoTable({
        startY: doc.lastAutoTable.finalY + 10,
        head: [['Marca', 'Tipo', 'Categoria', 'Qtd', 'Peso', 'Processo']],
        body: obra.pecas.map(p => [
            p.marca,
            p.tipo,
            p.categoria,
            p.qtd,
            `${p.peso}kg`,
            getProcessoInfo(p.processo).nome
        ]),
        theme: 'grid',
        styles: { fontSize: 7 }
    });
    
    doc.save(`${(tipo || 'Relatorio').replace(/\s+/g, '_')}_${obra.nome.replace(/\s+/g, '_')}.pdf`);
    fecharModal('modal-export');
}

    const resumo = calcularResumo(obra.pecas);
    const totais = calcularTotais(obra.pecas);
    const pesoTotal = obra.pecas.reduce((a, p) => a + (p.peso || 0), 0);
    
    const wb = XLSX.utils.book_new();
    
    // Aba Resumo
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
        [tipo || 'Relatório'],
        [obra.nome, obra.cliente, new Date().toLocaleDateString('pt-BR')],
        [],
        ['Categoria', 'Qtd', 'Peso (t)', '% Peso', 'Expedidos'],
        ...resumo.map(r => [r.categoria, r.total, (r.peso/1000).toFixed(2), `${(r.peso/pesoTotal*100).toFixed(1)}%`, r.porProcesso['EXPEDIDO'] || 0]),
        ['TOTAL', totais.total, (pesoTotal/1000).toFixed(2), '100%', totais.porProcesso['EXPEDIDO'] || 0]
    ]), 'Resumo');
    
    // Aba Peças
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
        ['Marca', 'Tipo', 'Categoria', 'Qtd', 'Peso (kg)', 'Processo', 'Fabricados', 'Enviados'],
        ...obra.pecas.map(p => [p.marca, p.tipo, p.categoria, p.qtd, p.peso, getProcessoInfo(p.processo).nome, p.fabricados || 0, p.enviados || 0])
    ]), 'Peças');
    
    XLSX.writeFile(wb, `${(tipo || 'Relatorio').replace(/\s+/g, '_')}_${obra.nome.replace(/\s+/g, '_')}.xlsx`);
    fecharModal('modal-export');
}

let deferredPrompt;

// Service Worker Registration
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        // Criar service worker inline como blob
        const swCode = `
            const CACHE_NAME = 'montex-v5.0';
            const urlsToCache = ['/'];
            
            self.addEventListener('install', e => {
                e.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(urlsToCache)));
                self.skipWaiting();
            });
            
            self.addEventListener('fetch', e => {
                e.respondWith(
                    caches.match(e.request).then(response => response || fetch(e.request))
                );
            });
            
            self.addEventListener('activate', e => {
                e.waitUntil(
                    caches.keys().then(names => 
                        Promise.all(names.filter(n => n !== CACHE_NAME).map(n => caches.delete(n)))
                    )
                );
            });
        `;
        
        const blob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(blob);
        
        navigator.serviceWorker.register(swUrl).then(reg => {
            console.log('🔧 Service Worker registrado');
        }).catch(err => {
            console.log('Service Worker não suportado neste contexto');
        });
    });
}

// Detectar prompt de instalação
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    
    if (!installBannerShown && !localStorage.getItem('pwa-installed')) {
        showInstallBanner();
    }
});

// Mostrar banner de instalação
function showInstallBanner() {
    if (document.querySelector('.install-banner')) return;
    
    installBannerShown = true;

    banner.className = 'install-banner';
    banner.innerHTML = `

        <button onclick="dismissInstallBanner()" style="background:transparent;border:none;color:white;font-size:20px;cursor:pointer;opacity:0.7;">

        </button>
    `;
    
    document.body.appendChild(banner);

// Instalar PWA
async function installPWA() {
    if (!deferredPrompt) {
        // Mostrar instruções manuais
        alert('📱 Para instalar no Mac/iPhone:\n\n' +
              '1. Clique no menu "Compartilhar" (Safari) ou "⋮" (Chrome)\n' +
              '2. Selecione "Adicionar à Tela de Início"\n' +
              '3. Confirme a instalação\n\n' +
              'O app funcionará offline!');
        return;
    }
    
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    
    if (outcome === 'accepted') {
        localStorage.setItem('pwa-installed', 'true');
        console.log('✅ PWA instalado');
    }
    
    deferredPrompt = null;
    dismissInstallBanner();
}

// Fechar banner
function dismissInstallBanner() {
    const banner = document.querySelector('.install-banner');
    if (banner) {
        banner.style.animation = 'slideUp .3s ease reverse';
        setTimeout(() => banner.remove(), 300);
    }
    localStorage.setItem('install-banner-dismissed', 'true');
}

// Detectar se está rodando como PWA
function isPWA() {
    return window.matchMedia('(display-mode: standalone)').matches ||
           window.navigator.standalone === true;
}

// Ajustar UI se for PWA
if (isPWA()) {
    document.documentElement.style.setProperty('--header-padding', 'env(safe-area-inset-top)');

}
