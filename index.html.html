    <style>
        *{font-family:'Inter',sans-serif;margin:0;padding:0;box-sizing:border-box}
        html,body{height:100%;overflow:hidden;background:#0f172a}
        
        /* Suporte a safe-area para notch do iPhone */
        body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
        
        /* Scrollbar */
        ::-webkit-scrollbar{width:5px;height:5px}
        ::-webkit-scrollbar-track{background:#1e293b}
        ::-webkit-scrollbar-thumb{background:#475569;border-radius:3px}
        ::-webkit-scrollbar-thumb:hover{background:#64748b}
        
        /* Animations */
        .fade-in{animation:fadeIn .3s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
        .pulse{animation:pulse 2s infinite}
        
        /* UI Elements */
        .drop-zone{border:2px dashed #475569;transition:all .3s}
        .drop-zone.dragover{border-color:#3b82f6;background:rgba(59,130,246,0.1);transform:scale(1.02)}
        .modal-bg{background:rgba(0,0,0,0.8);backdrop-filter:blur(8px)}
        .card-hover{transition:all .2s}
        .card-hover:hover{transform:translateY(-2px);box-shadow:0 10px 40px rgba(0,0,0,0.3)}
        .kanban-col{min-height:200px}
        .peca-card{transition:all .2s;cursor:pointer}
        .peca-card:hover{transform:scale(1.02);z-index:10}
        .progress-bar{transition:width .5s ease}
        .glow{box-shadow:0 0 20px rgba(59,130,246,0.3)}
        
        /* Status Colors */
        .status-aguardando{border-left:4px solid #6b7280}
        .status-corte{border-left:4px solid #f59e0b}
        .status-fabricacao{border-left:4px solid #3b82f6}
        .status-solda{border-left:4px solid #8b5cf6}
        .status-pintura{border-left:4px solid #ec4899}
        .status-expedido{border-left:4px solid #10b981}
        
        /* Categories */
        .categoria-vigas{--cat-color:#3b82f6}
        .categoria-tesouras{--cat-color:#8b5cf6}
        .categoria-tercas{--cat-color:#10b981}
        .categoria-contrav{--cat-color:#ef4444}
        .categoria-tirantes{--cat-color:#f59e0b}
        .categoria-outros{--cat-color:#6366f1}
        
        /* Install Banner */
        .install-banner{
            position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
            background:linear-gradient(135deg,#368784,#2a6b69);
            padding:12px 24px;border-radius:12px;
            box-shadow:0 10px 40px rgba(54,135,132,0.4);
            display:flex;align-items:center;gap:16px;
            z-index:9999;animation:slideUp .5s ease;
        }
        @keyframes slideUp{from{transform:translateX(-50%) translateY(100px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
        .install-banner.hidden{display:none}
        
        /* ==================== RESPONSIVO - MOBILE & TABLET ==================== */
        
        /* Tablet (iPad) */
        @media (max-width: 1024px) {
            #app { flex-direction: column !important; }
            aside.w-16 { 
                width: 100% !important; 
                height: auto !important; 
                flex-direction: row !important; 
                padding: 8px 16px !important;
                border-right: none !important;
                border-bottom: 1px solid #334155 !important;
                overflow-x: auto !important;
            }
            aside nav { flex-direction: row !important; gap: 8px !important; }
            aside .mb-6 { margin-bottom: 0 !important; margin-right: 16px !important; }
            header { padding: 12px 16px !important; }
            #page-content { padding: 12px !important; }
        }
        
        /* Mobile */
        @media (max-width: 768px) {
            header { flex-direction: column !important; gap: 12px !important; align-items: stretch !important; }
            header > div:first-child { justify-content: center !important; }
            header > div:last-child { justify-content: center !important; flex-wrap: wrap !important; }
            #obra-select { min-width: 100% !important; }
            table { font-size: 11px !important; }
            th, td { padding: 4px 6px !important; }
            .modal-bg > div { max-width: 95% !important; margin: 8px !important; padding: 16px !important; max-height: 90vh !important; overflow-y: auto !important; }
        }
        
        /* Mobile pequeno */
        @media (max-width: 480px) {
            aside.w-16 { padding: 6px 8px !important; }
            aside nav button { width: 36px !important; height: 36px !important; }
            header h1 { font-size: 14px !important; }
            .text-3xl { font-size: 1.25rem !important; }
            .text-2xl { font-size: 1rem !important; }
        }
        
        /* Touch-friendly */
        @media (hover: none) and (pointer: coarse) {
            button, select, input { min-height: 44px !important; }
            nav button { min-width: 44px !important; min-height: 44px !important; }
        }
        
        /* Safe area para iPhone com notch */

            body {

                padding-bottom: env(safe-area-inset-bottom);
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
            }
        }

const getProcessoInfo = (proc) => PROCESSOS.find(p => p.id === proc) || PROCESSOS[0];

// Medição vencida: status VENCIDO, ou PENDENTE com vencimento já passado (predicado único)
const isVencida = (m) => m.status === 'VENCIDO' ||
    (m.status === 'PENDENTE' && m.dataVencimento && m.dataVencimento < new Date().toISOString().slice(0, 10));

// Data de expedição de uma peça (1ª entrada EXPEDIDO no histórico) — só p/ peças ATUALMENTE expedidas.
// Conta cada peça uma única vez (evita dupla contagem por reexpedição) e mantém coerência com o status atual.
const getDataExpedicao = (p) => {
    if ((p.processo || '') !== 'EXPEDIDO') return null;
    const datas = (p.historico || [])
        .filter(h => h.processo === 'EXPEDIDO' && h.data)
        .map(h => new Date(h.data).getTime())
        .filter(t => !isNaN(t));
    return datas.length ? new Date(Math.min(...datas)) : null;
};

const formatPeso = (kg) => {
    if (kg >= 1000) return `${(kg/1000).toFixed(2)}t`;
    return `${kg}kg`;
};

const calcularResumo = (pecas) => {
    const resumo = {};
    pecas.forEach(p => {
        const cat = p.categoria || 'OUTROS';
        if (!resumo[cat]) {
            resumo[cat] = { categoria: cat, total: 0, peso: 0, porProcesso: {} };
            PROCESSOS.forEach(proc => resumo[cat].porProcesso[proc.id] = 0);
        }
        resumo[cat].total += p.qtd;
        resumo[cat].peso += p.peso || 0;
        resumo[cat].porProcesso[p.processo || 'AGUARDANDO'] += p.qtd;
    });
    return Object.values(resumo).sort((a,b) => (getCategoriaInfo(a.categoria).ordem || 99) - (getCategoriaInfo(b.categoria).ordem || 99));
};

const calcularTotais = (pecas) => {
    const t = { total: 0, peso: 0, porProcesso: {} };
    PROCESSOS.forEach(p => t.porProcesso[p.id] = 0);
    pecas.forEach(p => {
        t.total += p.qtd;
        t.peso += p.peso || 0;
        t.porProcesso[p.processo || 'AGUARDANDO'] += p.qtd;
    });
    return t;
};

    const newOptions = db.obras.length 
        ? db.obras.map(o => `<option value="${o.id}">${o.nome} (${o.cliente})</option>`).join('')
        : '<option value="">Nenhuma obra cadastrada</option>';
    
    // Só atualizar se mudou
    if (!currentOptions.includes(newOptions.substring(0, 50))) {
        sel.innerHTML = newOptions;
    }
    
    // Definir valor selecionado
    if (db.ativa) {
        sel.value = db.ativa;
    }
    
    // Garantir que o evento está configurado
    if (!sel._hasListener) {
        sel.addEventListener('change', function(e) {
            const novoId = e.target.value;
            console.log('Select change event:', novoId);
            if (novoId) selecionarObra(novoId);
        });
        sel._hasListener = true;
    }
    
    // Subtítulo
    document.getElementById('obra-subtitle').textContent = obra 
        ? `${obra.codigo || 'S/C'} | ${obra.pecas.length} peças | ${formatPeso(obra.pecas.reduce((a,p) => a + (p.peso||0), 0))}`
        : 'Selecione ou crie uma obra';
    
    renderMenu();
}

function selecionarObra(id) {
    console.log('selecionarObra chamada com:', id, typeof id);
    if (!id || id === '') return;
    
    let db = getDB();
    
    // Manter o ID como veio (pode ser string ou número)
    // Só converter para número se for puramente numérico
    let idFinal = id;
    if (typeof id === 'string' && /^\d+$/.test(id)) {
        idFinal = Number(id);
    }
    
    console.log('ID final:', idFinal, typeof idFinal);
    
    // Se já é a mesma obra, não fazer nada (comparação flexível)
    if (db.ativa == idFinal) {
        console.log('Mesma obra, ignorando');
        return;
    }
    
    console.log('Mudando de obra', db.ativa, 'para', idFinal);
    
    // Verificar se a obra existe (comparação flexível com ==)
    const obraExiste = db.obras.find(o => o.id == idFinal);
    if (!obraExiste) {
        console.error('Obra não encontrada:', idFinal);
        console.log('IDs disponíveis:', db.obras.map(o => o.id));
        return;
    }
    
    // Atualizar e salvar
    db.ativa = obraExiste.id; // Usar o ID exato da obra encontrada
    saveDB(db);
    
    // Verificar se salvou corretamente
    const dbVerify = getDB();
    console.log('Verificação - db.ativa após salvar:', dbVerify.ativa);
    
    // Atualizar subtítulo
    document.getElementById('obra-subtitle').textContent = 
        `${obraExiste.codigo || 'S/C'} | ${obraExiste.pecas.length} peças | ${formatPeso(obraExiste.pecas.reduce((a,p) => a + (p.peso||0), 0))}`;
    
    // Forçar atualização da página
    console.log('Chamando renderPagina...');
    renderPagina();
    console.log('renderPagina concluído');
}

function criarObra() {
    const nome = document.getElementById('inp-obra-nome').value.trim();
    const cliente = document.getElementById('inp-obra-cliente').value.trim();
    if (!nome || !cliente) { alert('Nome e Cliente são obrigatórios!'); return; }
    
    const db = getDB();
    const nova = {
        id: 'obra_' + Date.now(),
        nome,

        codigo: document.getElementById('inp-obra-codigo').value.trim(),
        local: document.getElementById('inp-obra-local').value.trim(),
        dataCriacao: new Date().toISOString(),
        pecas: []
    };
    db.obras.push(nova);
    db.ativa = nova.id;
    saveDB(db);
    
    fecharModal('modal-obra');
    ['inp-obra-nome', 'inp-obra-cliente', 'inp-obra-codigo', 'inp-obra-local'].forEach(id => document.getElementById(id).value = '');

function excluirObra(id) {
    if (!confirm('Excluir esta obra e todas as peças?')) return;
    const db = getDB();
    db.obras = db.obras.filter(o => o.id !== id);
    if (db.ativa === id) db.ativa = db.obras.length ? db.obras[0].id : null;
    saveDB(db);
    atualizarUI();
    renderPagina();
}

function processarArquivo(file) {
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, { type: 'array' });
            const ws = wb.Sheets[wb.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(ws, { header: 1 });
            
            // Encontrar linha de cabeçalho (procura por "MARCA")
            let headerIdx = json.findIndex(row => {
                if (!row || !Array.isArray(row)) return false;
                return row.some(cell => {
                    if (cell === null || cell === undefined) return false;
                    return String(cell).toUpperCase().includes('MARCA');
                });
            });
            if (headerIdx < 0) headerIdx = 0;
            
            // Garantir que temos um array válido para as colunas
            const headerRow = json[headerIdx] || [];
            colunasImport = headerRow.map(c => String(c || '').trim());
            
            // Encontrar índice da coluna MARCA
            const marcaIdx = colunasImport.findIndex(c => c && c.toUpperCase().includes('MARCA'));
            
            // Filtrar dados (ignorar linhas vazias e de totais)
            dadosImport = json.slice(headerIdx + 1).filter(row => {
                if (!row || !Array.isArray(row)) return false;
                const marca = marcaIdx >= 0 ? row[marcaIdx] : null;
                if (!marca) return false;
                const marcaStr = String(marca).trim().toUpperCase();
                if (marcaStr === '' || marcaStr.includes('TOTAL') || marcaStr.includes('PESO')) return false;
                return true;
            });
            
            // Mostrar preview
            document.getElementById('preview-area').classList.remove('hidden');
            document.getElementById('total-items').textContent = dadosImport.length;
            
            // Calcular peso total
            const pesoColIdx = colunasImport.findIndex((c, i) => {
                const colName = (c || '').toUpperCase();
                return colName.includes('PESO') && !colName.includes('UNIT') && !colName.includes('ENVIAR') && !colName.includes('ENVIADO');
            });
            const pesoTotal = pesoColIdx >= 0 ? dadosImport.reduce((a, row) => a + (parseFloat(row[pesoColIdx]) || 0), 0) : 0;
            document.getElementById('peso-total-import').textContent = `Peso Total: ${formatPeso(pesoTotal)}`;
            
            // Tabela de preview - pegar apenas colunas não vazias
            const colunasVisiveis = colunasImport.map((c, i) => ({ nome: c || `Col ${i+1}`, idx: i })).filter(c => c.nome.trim() !== '').slice(0, 8);
            
            let tbl = `<table class="w-full"><thead class="bg-slate-800"><tr>`;
            colunasVisiveis.forEach(c => tbl += `<th class="px-2 py-1 text-left text-slate-400 whitespace-nowrap">${c.nome.substring(0, 15)}</th>`);
            tbl += '</tr></thead><tbody>';
            dadosImport.slice(0, 5).forEach(row => {
                tbl += '<tr class="border-t border-slate-700">';
                colunasVisiveis.forEach(c => tbl += `<td class="px-2 py-1 text-slate-300 whitespace-nowrap">${row[c.idx] !== undefined ? row[c.idx] : '-'}</td>`);
                tbl += '</tr>';
            });
            if (dadosImport.length > 5) tbl += `<tr><td colspan="${colunasVisiveis.length}" class="px-2 py-2 text-slate-500 text-center">... +${dadosImport.length - 5} itens</td></tr>`;
            tbl += '</tbody></table>';
            document.getElementById('preview-table').innerHTML = tbl;
            
            // Mapeamento de colunas
            const campos = [
                { id: 'marca', label: 'Marca', keywords: ['MARCA'] },
                { id: 'tipo', label: 'Tipo/Nome', keywords: ['NOME', 'TIPO', 'DESC'] },
                { id: 'qtd', label: 'Quantidade', keywords: ['QTD', 'QUANT', 'PÇ', 'QUANTIDADE'] },
                { id: 'peso', label: 'Peso (kg)', keywords: ['PESO'] },
                { id: 'enviados', label: 'Enviados', keywords: ['ENVIADOS', 'ENV'] },
                { id: 'fabricados', label: 'Fabricados', keywords: ['FABRICADOS', 'FAB'] }
            ];
            
            let mapHtml = '';
            campos.forEach(campo => {
                const colUpper = colunasImport.map(c => (c || '').toUpperCase());
                let selected = -1;
                
                // Procurar coluna que corresponda
                for (let i = 0; i < colUpper.length; i++) {
                    const colName = colUpper[i];
                    if (!colName) continue;
                    
                    if (campo.keywords.some(k => colName.includes(k))) {
                        // Para peso, evitar colunas erradas
                        if (campo.id === 'peso') {
                            if (colName.includes('UNIT') || colName.includes('ENVIAR') || colName.includes('ENVIADO')) {
                                continue;
                            }
                        }
                        selected = i;
                        break;
                    }
                }
                
                mapHtml += `
                    <div>
                        <label class="text-slate-400 text-xs">${campo.label}</label>
                        <select id="map-${campo.id}" class="w-full mt-1 bg-slate-800 border border-slate-600 rounded-lg px-2 py-1.5 text-sm">
                            <option value="">-- Ignorar --</option>
                            ${colunasImport.map((c, i) => `<option value="${i}" ${i === selected ? 'selected' : ''}>${(c || 'Coluna ' + (i+1)).substring(0, 20)}</option>`).join('')}
                        </select>
                    </div>
                `;
            });
            document.getElementById('col-mapping').innerHTML = mapHtml;
            
        } catch (err) {
            alert('Erro ao processar arquivo: ' + err.message);
            console.error(err);
        }
    };
    reader.readAsArrayBuffer(file);
}

function executarImportacao(substituir = false) {
    const obra = getObraAtiva();
    if (!obra) { alert('Selecione uma obra primeiro!'); return; }
    
    const getMap = (id) => {
        const v = document.getElementById('map-' + id)?.value;
        return v !== '' ? parseInt(v) : -1;
    };
    
    const mapMarca = getMap('marca');
    if (mapMarca < 0) { alert('Mapeie pelo menos a coluna MARCA!'); return; }
    
    const mapTipo = getMap('tipo');
    const mapQtd = getMap('qtd');
    const mapPeso = getMap('peso');
    const mapEnviados = getMap('enviados');
    const mapFabricados = getMap('fabricados');
    
    const db = getDB();
    const obraIdx = db.obras.findIndex(o => o.id == obra.id);
    
    if (obraIdx < 0) { alert('Obra não encontrada!'); return; }
    
    if (substituir) db.obras[obraIdx].pecas = [];
    
    // Criar modal de progresso
    const progressModal = document.createElement('div');
    progressModal.className = 'fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4';
    progressModal.innerHTML = `
        <div class="bg-slate-800 rounded-2xl p-6 w-full max-w-2xl max-h-[80vh] overflow-hidden flex flex-col">
            <h3 class="text-xl font-bold mb-4">📥 Importando Dados...</h3>
            <div class="flex-1 overflow-auto bg-slate-900 rounded-lg p-4 font-mono text-xs" id="import-log" style="max-height: 400px;"></div>
            <div class="mt-4">
                <div class="bg-slate-700 rounded-full h-3 overflow-hidden">
                    <div id="import-progress" class="bg-emerald-500 h-full transition-all duration-200" style="width: 0%"></div>
                </div>
                <div class="flex justify-between mt-2 text-sm text-slate-400">
                    <span id="import-status">Iniciando...</span>
                    <span id="import-count">0 / ${dadosImport.length}</span>
                </div>
            </div>
        </div>
    `;
    document.body.appendChild(progressModal);
    
    const logDiv = document.getElementById('import-log');
    const progressBar = document.getElementById('import-progress');
    const statusText = document.getElementById('import-status');
    const countText = document.getElementById('import-count');
    
    function addLog(msg, type = 'info') {
        const colors = {
            'info': 'text-slate-400',
            'success': 'text-emerald-400',
            'warning': 'text-amber-400',
            'error': 'text-red-400',
            'data': 'text-blue-400'
        };
        logDiv.innerHTML += `<div class="${colors[type] || colors.info}">${msg}</div>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }
    
    addLog('🚀 Iniciando importação...', 'info');
    addLog(`📊 Total de linhas: ${dadosImport.length}`, 'info');
    addLog(`📋 Colunas mapeadas:`, 'info');
    addLog(`   • Marca: coluna ${mapMarca >= 0 ? mapMarca + 1 : 'N/A'}`, 'data');
    addLog(`   • Tipo: coluna ${mapTipo >= 0 ? mapTipo + 1 : 'N/A'}`, 'data');
    addLog(`   • Qtd: coluna ${mapQtd >= 0 ? mapQtd + 1 : 'N/A'}`, 'data');
    addLog(`   • Peso: coluna ${mapPeso >= 0 ? mapPeso + 1 : 'N/A'}`, 'data');
    addLog(`   • Fabricados: coluna ${mapFabricados >= 0 ? mapFabricados + 1 : 'N/A'}`, 'data');
    addLog(`   • Enviados: coluna ${mapEnviados >= 0 ? mapEnviados + 1 : 'N/A'}`, 'data');
    addLog('─'.repeat(50), 'info');
    
    let count = 0;
    let erros = 0;
    let idx = 0;
    
    function processarLinha() {
        if (idx >= dadosImport.length) {
            // Finalizar
            addLog('─'.repeat(50), 'info');
            addLog(`✅ Importação concluída!`, 'success');
            addLog(`   • ${count} peças importadas`, 'success');
            if (erros > 0) addLog(`   • ${erros} linhas ignoradas`, 'warning');
            
            const pesoTotal = db.obras[obraIdx].pecas.reduce((a, p) => a + (p.peso || 0), 0);
            addLog(`   • Peso total: ${formatPeso(pesoTotal)}`, 'success');
            
            saveDB(db);
            
            statusText.textContent = 'Concluído!';
            progressBar.style.width = '100%';
            progressBar.classList.remove('bg-emerald-500');
            progressBar.classList.add('bg-blue-500');
            
            setTimeout(() => {
                progressModal.remove();
                atualizarUI();
                renderPagina();
                alert(`✅ Importação concluída!\n\n📦 ${count} peças importadas\n⚖️ Peso total: ${formatPeso(pesoTotal)}`);
            }, 1500);
            return;
        }
        
        const row = dadosImport[idx];
        const marca = String(row[mapMarca] || '').trim().toUpperCase();
        
        if (!marca) {
            addLog(`⚠️ Linha ${idx + 1}: MARCA vazia - ignorada`, 'warning');
            erros++;
        } else {
            const tipo = mapTipo >= 0 ? String(row[mapTipo] || '').trim().toUpperCase() : 'N/D';
            const qtd = mapQtd >= 0 ? (parseInt(row[mapQtd]) || 1) : 1;
            const peso = mapPeso >= 0 ? (parseFloat(row[mapPeso]) || 0) : 0;
            const enviados = mapEnviados >= 0 ? (parseInt(row[mapEnviados]) || 0) : 0;
            const fabricados = mapFabricados >= 0 ? (parseInt(row[mapFabricados]) || 0) : 0;
            
            // Determinar categoria baseado no tipo
            let categoria = 'OUTROS';
            if (tipo.includes('VIGA') && tipo.includes('TRAV')) categoria = 'VIGAS TRAV.';
            else if (tipo.includes('VIGA')) categoria = 'VIGAS';
            else if (tipo.includes('TESOURA')) categoria = 'TESOURAS';
            else if (tipo.includes('TERÇA') || tipo.includes('TERCA')) categoria = 'TERÇAS';
            else if (tipo.includes('CONTRAV')) categoria = 'CONTRAV.';
            else if (tipo.includes('TIRANTE')) categoria = 'TIRANTES';
            else if (tipo.includes('LANTERNIM')) categoria = 'LANTERNIM';
            else if (tipo.includes('MÃO FRANCESA') || tipo.includes('MAO FRANCESA')) categoria = 'MÃO FRANCESA';
            else if (tipo.includes('PASSARELA')) categoria = 'PASSARELA';
            
            // Determinar processo baseado no status
            let processo = 'AGUARDANDO';
            if (enviados >= qtd) processo = 'EXPEDIDO';
            else if (fabricados >= qtd) processo = 'PINTURA';
            
            db.obras[obraIdx].pecas.push({
                id: Date.now() + idx,
                marca,
                tipo,
                categoria,
                qtd,
                peso,
                enviados,
                fabricados,
                processo,
                historico: []
            });
            
            addLog(`✓ ${marca} | ${tipo} | ${qtd}pç | ${peso.toFixed(1)}kg | ${categoria} | ${processo}`, 'success');
            count++;
        }
        
        idx++;
        const progress = Math.round((idx / dadosImport.length) * 100);
        progressBar.style.width = progress + '%';
        countText.textContent = `${idx} / ${dadosImport.length}`;
        statusText.textContent = `Processando: ${marca || 'linha ' + idx}`;
        
        // Processar próxima linha com pequeno delay para atualizar UI
        setTimeout(processarLinha, 5);
    }
    
    // Iniciar processamento
    setTimeout(processarLinha, 100);
}

// Funções para notas de produção
function adicionarNota(pecaId) {
    const funcionario = document.getElementById('nota-funcionario')?.value || '';
    const qtd = document.getElementById('nota-qtd')?.value || '';
    const data = document.getElementById('nota-data')?.value || '';
    
    if (!funcionario) {
        alert('Selecione ou digite o nome do funcionário!');
        return;
    }
    
    const db = getDB();
    const obra = getObraAtiva();
    if (!obra) return;
    
    const obraIdx = db.obras.findIndex(o => o.id === obra.id);
    const peca = db.obras[obraIdx].pecas.find(p => p.id === pecaId);
    if (!peca) return;
    
    // Inicializar array de notas
    if (!peca.notas) peca.notas = [];
    
    // Adicionar nota
    peca.notas.push({
        funcionario,
        qtd: qtd ? parseInt(qtd) : null,
        data,
        timestamp: new Date().toISOString()
    });
    
    // Também registrar na produção da equipe se funcionário cadastrado
    const funcionarios = getFuncionarios();
    const func = funcionarios.find(f => f.nome.toLowerCase() === funcionario.toLowerCase());
    if (func) {
        if (!peca.producaoEquipe) peca.producaoEquipe = [];
        peca.producaoEquipe.push({
            funcionarioId: func.id,
            processo: peca.processo,
            data: new Date().toISOString(),
            qtd: qtd ? parseInt(qtd) : peca.qtd
        });
    }
    
    saveDB(db);
    abrirPeca(pecaId); // Recarregar modal
}

function removerNota(pecaId, notaIdx) {
    if (!confirm('Remover esta nota?')) return;
    
    const db = getDB();
    const obra = getObraAtiva();
    if (!obra) return;
    
    const obraIdx = db.obras.findIndex(o => o.id === obra.id);
    const peca = db.obras[obraIdx].pecas.find(p => p.id === pecaId);
    if (!peca || !peca.notas) return;
    
    peca.notas.splice(notaIdx, 1);
    saveDB(db);
    abrirPeca(pecaId); // Recarregar modal
}

function atualizarProcesso(pecaId, novoProcesso) {
    const db = getDB();
    const obra = getObraAtiva();
    if (!obra) return;
    
    const obraIdx = db.obras.findIndex(o => o.id === obra.id);
    const pecaIdx = db.obras[obraIdx].pecas.findIndex(p => p.id === pecaId);
    if (pecaIdx < 0) return;
    
    const peca = db.obras[obraIdx].pecas[pecaIdx];
    peca.processo = novoProcesso;
    peca.historico = peca.historico || [];
    peca.historico.push({ processo: novoProcesso, data: new Date().toISOString() });
    
    // Auto-atualizar contadores
    if (novoProcesso === 'EXPEDIDO') {
        peca.enviados = peca.qtd;
        peca.fabricados = peca.qtd;
    } else if (['PINTURA', 'SOLDA'].includes(novoProcesso)) {
        peca.fabricados = peca.qtd;
    }
    
    saveDB(db);
    fecharModal('modal-peca');
    atualizarUI();
    renderPagina();
}

function salvarQuantidades(pecaId) {
    const db = getDB();
    const obra = getObraAtiva();
    if (!obra) return;
    
    const obraIdx = db.obras.findIndex(o => o.id === obra.id);
    const pecaIdx = db.obras[obraIdx].pecas.findIndex(p => p.id === pecaId);
    if (pecaIdx < 0) return;
    
    db.obras[obraIdx].pecas[pecaIdx].fabricados = parseInt(document.getElementById('inp-fabricados').value) || 0;
    db.obras[obraIdx].pecas[pecaIdx].enviados = parseInt(document.getElementById('inp-enviados').value) || 0;
    
    saveDB(db);
    fecharModal('modal-peca');
    atualizarUI();
    renderPagina();
}

function atualizarProcessoLote(processo) {
    const checks = document.querySelectorAll('.peca-check:checked');
    if (checks.length === 0) { alert('Selecione pelo menos uma peça!'); return; }
    
    const db = getDB();
    const obra = getObraAtiva();
    if (!obra) return;
    
    const obraIdx = db.obras.findIndex(o => o.id === obra.id);
    
    checks.forEach(cb => {
        const pecaId = parseInt(cb.dataset.id);
        const pecaIdx = db.obras[obraIdx].pecas.findIndex(p => p.id === pecaId);
        if (pecaIdx >= 0) {
            const peca = db.obras[obraIdx].pecas[pecaIdx];
            peca.processo = processo;
            peca.historico = peca.historico || [];
            peca.historico.push({ processo, data: new Date().toISOString() });
            if (processo === 'EXPEDIDO') { peca.enviados = peca.qtd; peca.fabricados = peca.qtd; }
            else if (['PINTURA', 'SOLDA'].includes(processo)) { peca.fabricados = peca.qtd; }
        }
    });
    
    saveDB(db);
    atualizarUI();
    renderPagina();
}

// ==================== FÍSICO-FINANCEIRO ====================
function renderFinanceiro(c, obra) {
    if (!obra) {
        c.innerHTML = `<div class="flex items-center justify-center h-full"><p class="text-slate-400">Selecione uma obra</p></div>`;
        return;
    }
    
    // Inicializar medições se não existir
    if (!obra.medicoes) obra.medicoes = [];
    
    // SEMPRE usar dados reais da obra
    const fin = obra.financeiro || {};
    const orcamento = fin.orcamento || 0;
    const valorKg = fin.valorKg || 2.50;
    
    // Calcular métricas físicas REAIS da obra
    const pesoTotal = obra.pecas.reduce((a, p) => a + (p.peso || 0), 0);
    const pesoExpedido = obra.pecas.filter(p => p.processo === 'EXPEDIDO').reduce((a, p) => a + (p.peso || 0), 0);
    const pesoAguardando = pesoTotal - pesoExpedido;
    const pctFisico = pesoTotal > 0 ? (pesoExpedido / pesoTotal * 100) : 0;
    
    // Calcular peso por processo para medição sugerida
    const pesoCorte = obra.pecas.filter(p => p.processo === 'CORTE').reduce((a, p) => a + (p.peso || 0), 0);
    const pesoFabricacao = obra.pecas.filter(p => p.processo === 'FABRICACAO').reduce((a, p) => a + (p.peso || 0), 0);
    const pesoSolda = obra.pecas.filter(p => p.processo === 'SOLDA').reduce((a, p) => a + (p.peso || 0), 0);
    const pesoPintura = obra.pecas.filter(p => p.processo === 'PINTURA').reduce((a, p) => a + (p.peso || 0), 0);
    
    // Calcular peso fabricado (em produção + expedido) - exclui apenas AGUARDANDO
    const pesoFabricado = pesoCorte + pesoFabricacao + pesoSolda + pesoPintura + pesoExpedido;
    const pesoEmProducao = pesoCorte + pesoFabricacao + pesoSolda + pesoPintura;
    
    // Calcular valor baseado no peso - CORRIGIDO: peso em kg × valor por kg
    const orcamentoCalculado = orcamento > 0 ? orcamento : pesoTotal * valorKg;
    
    // Calcular totais das medições
    const totalMedicoes = obra.medicoes.reduce((a, m) => a + (m.valor || 0), 0);
    const medicoesPagas = obra.medicoes.filter(m => m.status === 'PAGO').reduce((a, m) => a + (m.valor || 0), 0);
    const medicoesPendentes = obra.medicoes.filter(m => m.status === 'PENDENTE').reduce((a, m) => a + (m.valor || 0), 0);
    const medicoesVencidas = obra.medicoes.filter(m => m.status === 'VENCIDO').reduce((a, m) => a + (m.valor || 0), 0);
    
    // CÁLCULO DA MEDIÇÃO SUGERIDA - CORRIGIDO
    // Valor total do material fabricado (em produção + expedido)
    const valorFabricado = pesoFabricado * valorKg;
    // Valor já medido (soma de todas as medições)
    const valorJaMedido = totalMedicoes;
    // Valor disponível para medir (fabricado - já medido)
    const valorSugeridoMedicao = Math.max(0, valorFabricado - valorJaMedido);
    // Peso disponível para medir
    const pesoDisponivelMedir = valorKg > 0 ? valorSugeridoMedicao / valorKg : 0;
    // Percentual do total que pode ser medido
    const pctDisponivelMedir = pesoTotal > 0 ? (pesoDisponivelMedir / pesoTotal * 100) : 0;
    
    // Usar valor pago das medições como custo real
    const custoReal = medicoesPagas;
    const valorAPagar = orcamentoCalculado - custoReal;
    
    // Calcular métricas EVM
    const valorAgregado = orcamentoCalculado * (pctFisico / 100);
    const custoRealizado = custoReal;
    
    const CPI = custoRealizado > 0 ? (valorAgregado / custoRealizado) : (valorAgregado > 0 ? 999 : 1);
    const SPI = pctFisico / 100;
    const variacaoCusto = valorAgregado - custoRealizado;
    const EAC = CPI > 0 && CPI < 999 ? (orcamentoCalculado / CPI) : orcamentoCalculado;
    const VAC = orcamentoCalculado - EAC;
    const pctFinanceiro = orcamentoCalculado > 0 ? ((custoRealizado / orcamentoCalculado) * 100) : 0;
    
    // Calcular dados REAIS por categoria
    const resumo = calcularResumo(obra.pecas);
    const dadosCategorias = resumo.map(r => {
        const pecasCat = obra.pecas.filter(p => p.categoria === r.categoria);
        const pesoCat = pecasCat.reduce((a, p) => a + (p.peso || 0), 0);
        const pesoExpCat = pecasCat.filter(p => p.processo === 'EXPEDIDO').reduce((a, p) => a + (p.peso || 0), 0);
        const pctCat = pesoCat > 0 ? (pesoExpCat / pesoCat * 100) : 0;
        const valorCat = pesoCat * valorKg;
        return {
            categoria: r.categoria,
            peso: pesoCat,
            pesoExp: pesoExpCat,
            pct: pctCat,
            valor: valorCat,
            valorAgregado: valorCat * (pctCat / 100),

    });
    
    // Calcular dados por processo para tabela de sugestão

    }));
    
    // Verificar se tem dados
    const temDados = obra.pecas.length > 0;

    // Verificar medições vencidas

// ==================== CURVA S (real, temporal) ====================
// Baseline planejada (S de smoothstep entre dataInicio e dataFim) x realizado acumulado
function calcularCurvaS(obra, pesoTotal, orcamentoTotal) {
    const fin = obra.financeiro || {};
    const start = (fin.dataInicio || obra.dataInicio) ? new Date(fin.dataInicio || obra.dataInicio) : null;
    let end = (fin.dataFim || obra.dataPrevisao) ? new Date(fin.dataFim || obra.dataPrevisao) : null;

    // Eventos reais
    const expEvents = [];
    obra.pecas.forEach(p => { const d = getDataExpedicao(p); if (d) expEvents.push({ d, peso: p.peso || 0 }); });
    const medEvents = (obra.medicoes || [])
        .map(m => ({ d: new Date(m.dataInclusao || m.dataVencimento), val: m.valor || 0 }))
        .filter(e => !isNaN(e.d));
    expEvents.sort((a, b) => a.d - b.d);
    medEvents.sort((a, b) => a.d - b.d);

    const allDates = [...expEvents.map(e => e.d), ...medEvents.map(e => e.d)];
    const hoje = new Date();
    let ini = start || (allDates.length ? new Date(Math.min(...allDates)) : new Date());
    if (!end) end = allDates.length ? new Date(Math.max(...allDates)) : new Date(ini.getTime() + 86400000);
    if (end <= ini) end = new Date(ini.getTime() + 86400000 * 30);

    // Buckets mensais de ini até max(end, hoje)
    const last = end > hoje ? end : hoje;
    const meses = [];
    let cur = new Date(ini.getFullYear(), ini.getMonth(), 1);
    const lim = new Date(last.getFullYear(), last.getMonth(), 1);
    while (cur <= lim && meses.length < 60) { meses.push(new Date(cur)); cur.setMonth(cur.getMonth() + 1); }
    if (meses.length === 0) meses.push(new Date(ini));

    const labels = meses.map(m => m.toLocaleDateString('pt-BR', { month: 'short', year: '2-digit' }));
    const totalMs = Math.max(end - ini, 1);
    const mesAtual = new Date(hoje.getFullYear(), hoje.getMonth(), 1);

    const planejado = [], fisico = [], financeiro = [];
    let accPeso = 0, accVal = 0, ei = 0, mi = 0;
    meses.forEach(m => {
        const fimMes = new Date(m.getFullYear(), m.getMonth() + 1, 0, 23, 59, 59);
        // Planejado: smoothstep (3t²-2t³) no fim do mês
        const t = Math.min(1, Math.max(0, (fimMes - ini) / totalMs));
        planejado.push(Math.round((3 * t * t - 2 * t * t * t) * 100));
        // Realizado acumulado até o fim do mês
        while (ei < expEvents.length && expEvents[ei].d <= fimMes) { accPeso += expEvents[ei].peso; ei++; }
        while (mi < medEvents.length && medEvents[mi].d <= fimMes) { accVal += medEvents[mi].val; mi++; }
        const futuro = m > mesAtual;
        fisico.push(futuro ? null : Math.round(pesoTotal > 0 ? accPeso / pesoTotal * 100 : 0));
        financeiro.push(futuro ? null : Math.round(orcamentoTotal > 0 ? accVal / orcamentoTotal * 100 : 0));
    });

    return { labels, planejado, fisico, financeiro, temReal: expEvents.length > 0 || medEvents.length > 0 };
}

// Formatar data para exibição
function formatarData(dataStr) {
    if (!dataStr) return '-';
    const [ano, mes, dia] = dataStr.split('-');
    return `${dia}/${mes}/${ano}`;
}

// Salvar medição
function salvarMedicao(editIdx) {
    const descricao = document.getElementById('med-descricao').value.trim();
    const dataInclusao = document.getElementById('med-data-inclusao').value;
    const dataVencimento = document.getElementById('med-data-vencimento').value;
    const valor = parseFloat(document.getElementById('med-valor').value) || 0;
    const status = document.getElementById('med-status').value;
    const obs = document.getElementById('med-obs').value.trim();
    
    if (!descricao || !dataInclusao || !dataVencimento || valor <= 0) {
        alert('Preencha todos os campos obrigatórios!');
        return;
    }
    
    const db = getDB();
    const obra = db.obras.find(o => o.id === db.ativa);
    if (!obra) {
        alert('Erro: obra não encontrada!');
        return;
    }
    
    if (!obra.medicoes) obra.medicoes = [];
    
    const isEdit = editIdx !== null && editIdx !== 'null' && editIdx >= 0;
    
    const medicao = {
        id: isEdit ? obra.medicoes[editIdx].id : Date.now().toString(),
        descricao,
        dataInclusao,
        dataVencimento,
        valor,
        status,
        obs,
        criadoEm: isEdit ? obra.medicoes[editIdx].criadoEm : new Date().toISOString(),
        atualizadoEm: new Date().toISOString()
    };
    
    // Verificar se está vencido
    const hoje = new Date().toISOString().split('T')[0];
    if (status === 'PENDENTE' && dataVencimento < hoje) {
        medicao.status = 'VENCIDO';
    }
    
    if (isEdit) {
        obra.medicoes[editIdx] = medicao;
    } else {
        obra.medicoes.push(medicao);
    }
    
    // Atualizar custo real no financeiro
    obra.financeiro = obra.financeiro || {};
    obra.financeiro.custoReal = obra.medicoes.filter(m => m.status === 'PAGO').reduce((a, m) => a + (m.valor || 0), 0);
    
    saveDB(db);
    fecharModalMedicao();
    renderPagina();
}

// Editar medição
function editarMedicao(idx) {
    abrirModalMedicao(idx);
}

// Excluir medição
function excluirMedicao(idx) {
    if (!confirm('Excluir esta medição?')) return;
    
    const db = getDB();
    const obra = db.obras.find(o => o.id === db.ativa);
    if (!obra || !obra.medicoes) return;
    
    obra.medicoes.splice(idx, 1);
    
    // Atualizar custo real
    obra.financeiro = obra.financeiro || {};
    obra.financeiro.custoReal = obra.medicoes.filter(m => m.status === 'PAGO').reduce((a, m) => a + (m.valor || 0), 0);
    
    saveDB(db);
    renderPagina();
}

// Criar medição sugerida automaticamente
function criarMedicaoSugerida(valorSugerido, pesoSugerido) {
    const db = getDB();
    const obra = db.obras.find(o => o.id === db.ativa);
    if (!obra) {
        alert('Erro: obra não encontrada!');
        return;
    }
    
    if (!obra.medicoes) obra.medicoes = [];
    
    const numMedicao = obra.medicoes.length + 1;
    const hoje = new Date();
    const dataInclusao = hoje.toISOString().split('T')[0];
    
    // Vencimento padrão: 30 dias
    const vencimento = new Date(hoje);
    vencimento.setDate(vencimento.getDate() + 30);
    const dataVencimento = vencimento.toISOString().split('T')[0];
    
    // Formatar mês/ano para descrição
    const meses = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 
                   'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
    const mesAno = meses[hoje.getMonth()] + '/' + hoje.getFullYear();
    
    const medicao = {
        id: Date.now().toString(),
        descricao: `Medição ${numMedicao} - ${mesAno}`,
        dataInclusao,
        dataVencimento,
        valor: parseFloat(valorSugerido),
        pesoMedido: parseFloat(pesoSugerido),
        status: 'PENDENTE',
        obs: `Medição automática baseada na produção.\nPeso medido: ${formatPeso(parseFloat(pesoSugerido))}\nValor/kg: R$ ${(obra.financeiro?.valorKg || 2.50).toFixed(2)}`,
        criadoEm: new Date().toISOString(),
        atualizadoEm: new Date().toISOString(),
        tipo: 'SUGERIDA'
    };
    
    obra.medicoes.push(medicao);
    
    // Atualizar custo real no financeiro
    obra.financeiro = obra.financeiro || {};
    obra.financeiro.custoReal = obra.medicoes.filter(m => m.status === 'PAGO').reduce((a, m) => a + (m.valor || 0), 0);
    
    saveDB(db);
    renderPagina();
    
    // Abrir modal perguntando se quer exportar relatório
    abrirModalExportarMedicao(numMedicao - 1);
}

// Alterar status da medição
function alterarStatusMedicao(idx, novoStatus) {
    const db = getDB();
    const obra = db.obras.find(o => o.id === db.ativa);
    if (!obra || !obra.medicoes) return;
    
    obra.medicoes[idx].status = novoStatus;
    obra.medicoes[idx].atualizadoEm = new Date().toISOString();
    
    // Atualizar custo real
    obra.financeiro = obra.financeiro || {};
    obra.financeiro.custoReal = obra.medicoes.filter(m => m.status === 'PAGO').reduce((a, m) => a + (m.valor || 0), 0);
    
    saveDB(db);
    renderPagina();
}

// Salvar configuração financeira
function salvarConfigFinanceiro() {
    const db = getDB();
    const obra = db.obras.find(o => o.id === db.ativa);
    if (!obra) return;
    
    obra.financeiro = obra.financeiro || {};
    obra.financeiro.orcamento = parseFloat(document.getElementById('inp-orcamento').value) || 0;
    obra.financeiro.valorKg = parseFloat(document.getElementById('inp-valor-kg').value) || 2.50;
    obra.financeiro.custoKg = parseFloat(document.getElementById('inp-custo-kg').value) || 0;
    obra.financeiro.dataInicio = document.getElementById('inp-data-inicio').value;
    obra.financeiro.dataFim = document.getElementById('inp-data-fim').value;
    
    saveDB(db);
    fecharConfigFinanceiro();
    renderPagina();
}
function formatMoeda(valor) {
    if (Math.abs(valor) >= 1000000) return 'R$ ' + (valor / 1000000).toFixed(2) + 'M';
    if (Math.abs(valor) >= 1000) return 'R$ ' + (valor / 1000).toFixed(1) + 'k';
    return 'R$ ' + valor.toFixed(0);
}

// ==================== ABA MEDIÇÃO SUGERIDA ====================
function renderMedicaoSugerida(c, obra) {
    if (!obra) {
        c.innerHTML = `<div class="flex items-center justify-center h-full"><p class="text-slate-400">Selecione uma obra</p></div>`;
        return;
    }
    
    // Inicializar medições se não existir
    if (!obra.medicoes) obra.medicoes = [];
    
    const fin = obra.financeiro || {};
    const valorKg = fin.valorKg || 2.50;
    const orcamento = fin.orcamento || 0;
    
    // Calcular peso por processo
    const pesoTotal = obra.pecas.reduce((a, p) => a + (p.peso || 0), 0);
    const pesoAguardando = obra.pecas.filter(p => p.processo === 'AGUARDANDO').reduce((a, p) => a + (p.peso || 0), 0);
    const pesoCorte = obra.pecas.filter(p => p.processo === 'CORTE').reduce((a, p) => a + (p.peso || 0), 0);
    const pesoFabricacao = obra.pecas.filter(p => p.processo === 'FABRICACAO').reduce((a, p) => a + (p.peso || 0), 0);
    const pesoSolda = obra.pecas.filter(p => p.processo === 'SOLDA').reduce((a, p) => a + (p.peso || 0), 0);
    const pesoPintura = obra.pecas.filter(p => p.processo === 'PINTURA').reduce((a, p) => a + (p.peso || 0), 0);
    const pesoExpedido = obra.pecas.filter(p => p.processo === 'EXPEDIDO').reduce((a, p) => a + (p.peso || 0), 0);
    
    // Peso fabricado = em produção + expedido (tudo exceto AGUARDANDO)
    const pesoFabricado = pesoCorte + pesoFabricacao + pesoSolda + pesoPintura + pesoExpedido;
    const pesoEmProducao = pesoCorte + pesoFabricacao + pesoSolda + pesoPintura;
    
    // Valores financeiros - CORRIGIDO: peso em kg × valor por kg
    const orcamentoCalculado = orcamento > 0 ? orcamento : pesoTotal * valorKg;
    const valorFabricado = pesoFabricado * valorKg;
    const valorEmProducao = pesoEmProducao * valorKg;
    const valorExpedido = pesoExpedido * valorKg;
    const valorAguardando = pesoAguardando * valorKg;
    
    // Medições
    const totalMedicoes = obra.medicoes.reduce((a, m) => a + (m.valor || 0), 0);
    const medicoesPagas = obra.medicoes.filter(m => m.status === 'PAGO').reduce((a, m) => a + (m.valor || 0), 0);
    const medicoesPendentes = obra.medicoes.filter(m => m.status === 'PENDENTE').reduce((a, m) => a + (m.valor || 0), 0);
    const medicoesVencidas = obra.medicoes.filter(m => m.status === 'VENCIDO').reduce((a, m) => a + (m.valor || 0), 0);
    
    // Cálculo da medição sugerida
    const valorSugeridoMedicao = Math.max(0, valorFabricado - totalMedicoes);
    const pesoDisponivelMedir = valorKg > 0 ? valorSugeridoMedicao / valorKg : 0;
    const pctDisponivelMedir = pesoTotal > 0 ? (pesoDisponivelMedir / pesoTotal * 100) : 0;
    
    // Percentuais
    const pctFabricado = pesoTotal > 0 ? (pesoFabricado / pesoTotal * 100) : 0;
    const pctMedido = valorFabricado > 0 ? (totalMedicoes / valorFabricado * 100) : 0;

    // Dados por processo para gráfico
    const dadosProcessos = [
        { id: 'AGUARDANDO', nome: 'Aguardando', peso: pesoAguardando, cor: '#64748b', icon: '⏳' },
        { id: 'CORTE', nome: 'Corte', peso: pesoCorte, cor: '#f59e0b', icon: '✂️' },

        ...p,
        valor: p.peso * valorKg,
        pct: pesoTotal > 0 ? (p.peso / pesoTotal * 100) : 0
    }));

// ==================== MULTI-OBRAS (CONSOLIDADO) ====================
function renderMultiObras(c) {
    const db = getDB();
    
    // Usar dados REAIS de todas as obras cadastradas
    const obrasComDados = db.obras.map(obra => {
        const fin = obra.financeiro || {};
        const medicoes = obra.medicoes || [];
        const valorKg = fin.valorKg || 2.50;
        const pesoTotal = obra.pecas.reduce((a, p) => a + (p.peso || 0), 0);
        const pesoExpedido = obra.pecas.filter(p => p.processo === 'EXPEDIDO').reduce((a, p) => a + (p.peso || 0), 0);
        const pesoAguardando = obra.pecas.filter(p => p.processo !== 'EXPEDIDO').reduce((a, p) => a + (p.peso || 0), 0);
        const valorTotal = fin.orcamento || (pesoTotal / 1000) * valorKg;
        
        // Calcular valores das medições
        const totalMedido = medicoes.reduce((a, m) => a + (m.valor || 0), 0);
        const valorPago = medicoes.filter(m => m.status === 'PAGO').reduce((a, m) => a + (m.valor || 0), 0);
        const valorPendente = medicoes.filter(m => m.status === 'PENDENTE').reduce((a, m) => a + (m.valor || 0), 0);
        const valorVencido = medicoes.filter(m => m.status === 'VENCIDO').reduce((a, m) => a + (m.valor || 0), 0);
        
        return {
            id: obra.id,
            nome: obra.nome,
            codigo: obra.codigo || '',
            cliente: obra.cliente || '',
            pesoTotal,
            pesoEnviado: pesoExpedido,
            pesoAguardando,
            valorUnitario: valorKg,
            valorTotal,
            totalMedido,
            valorPago,
            valorPendente,
            valorVencido,
            totalPecas: obra.pecas.length,
            totalMedicoes: medicoes.length,
            cor: getCorObra(obra.id)
        };
    }).filter(o => o.pesoTotal > 0 || o.totalPecas > 0); // Filtrar obras vazias
    
    // Se não tiver obras com dados, mostrar mensagem
    if (obrasComDados.length === 0) {
        c.innerHTML = `
            <div class="h-full flex items-center justify-center">
                <div class="text-center max-w-md">
                    <div class="text-6xl mb-4">🏢</div>
                    <h2 class="text-2xl font-bold mb-2">Nenhuma Obra com Dados</h2>
                    <p class="text-slate-400 mb-6">Importe peças nas suas obras para ver o consolidado aqui.</p>
                    <button onclick="navegar('producao')" class="bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-700 hover:to-cyan-700 px-8 py-3 rounded-xl font-semibold transition-all">
                        Ir para Produção
                    </button>
                </div>
            </div>
        `;
        return;
    }
    
    // Calcular totais consolidados
    const totalPeso = obrasComDados.reduce((a, o) => a + o.pesoTotal, 0);
    const totalEnviado = obrasComDados.reduce((a, o) => a + o.pesoEnviado, 0);
    const totalAguardando = obrasComDados.reduce((a, o) => a + o.pesoAguardando, 0);
    const totalValor = obrasComDados.reduce((a, o) => a + o.valorTotal, 0);
    const totalMedido = obrasComDados.reduce((a, o) => a + o.totalMedido, 0);
    const totalPago = obrasComDados.reduce((a, o) => a + o.valorPago, 0);
    const totalPendente = obrasComDados.reduce((a, o) => a + o.valorPendente, 0);
    const totalVencido = obrasComDados.reduce((a, o) => a + o.valorVencido, 0);
    const totalAPagar = totalValor - totalPago;
    const totalPecas = obrasComDados.reduce((a, o) => a + o.totalPecas, 0);
    const totalMedicoes = obrasComDados.reduce((a, o) => a + o.totalMedicoes, 0);
    
    const pctFisicoGeral = totalPeso > 0 ? (totalEnviado / totalPeso * 100) : 0;
    const pctFinanceiroGeral = totalValor > 0 ? (totalPago / totalValor * 100) : 0;

// Função para gerar cor única por obra
function getCorObra(id) {
    const cores = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#84cc16'];
    const hash = id.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
    return cores[hash % cores.length];
}

// ==================== PRODUTIVIDADE (helper executivo) ====================
function calcularProdutividadeObra(obra) {
    const DIA = 86400000;
    const hoje = new Date(); hoje.setHours(0, 0, 0, 0);
    const keyDia = (d) => { const x = new Date(d); x.setHours(0,0,0,0); return x.toISOString().slice(0,10); };

    // Série diária (14 dias) de PESO expedido — cada peça contada 1x na sua data de expedição
    const mapaDia = {};
    obra.pecas.forEach(p => { const d = getDataExpedicao(p); if (d) mapaDia[keyDia(d)] = (mapaDia[keyDia(d)] || 0) + (p.peso || 0); });
    const serie = [];
    for (let i = 13; i >= 0; i--) {
        const d = new Date(hoje.getTime() - i * DIA);
        serie.push({
            label: d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }),
            peso: mapaDia[keyDia(d)] || 0
        });
    }

    // Ritmo dos últimos 30 dias. Duas taxas:
    //  - ritmoKgDia: produtividade por DIA ATIVO (quanto rende quando se trabalha) → KPI
    //  - ritmoKgDiaCal: média por DIA-CALENDÁRIO desde o início da expedição (considera ociosidade) → projeção de prazo
    let pesoExp30 = 0; const diasAtivos = new Set(); let minData30 = null;
    obra.pecas.forEach(p => {
        const d = getDataExpedicao(p);
        if (d && (hoje.getTime() - d.getTime()) <= 30 * DIA) {
            pesoExp30 += (p.peso || 0); diasAtivos.add(keyDia(d));
            if (!minData30 || d < minData30) minData30 = d;
        }
    });
    const ritmoKgDia = diasAtivos.size > 0 ? pesoExp30 / diasAtivos.size : 0;
    const spanDias = minData30
        ? Math.min(30, Math.max(1, Math.round((hoje.getTime() - new Date(minData30.getFullYear(), minData30.getMonth(), minData30.getDate()).getTime()) / DIA) + 1))
        : 1;
    const ritmoKgDiaCal = pesoExp30 / spanDias;

    // t/homem-dia: produção da equipe (producaoEquipe) ÷ homens-dia, últimos 30 dias
    let pesoEquipe30 = 0; const homensDia = new Set();
    obra.pecas.forEach(p => (p.producaoEquipe || []).forEach(r => {
        if (r.data && (hoje.getTime() - new Date(r.data).getTime()) <= 30 * DIA) {
            pesoEquipe30 += (p.peso || 0) * ((r.qtd || 1) / (p.qtd || 1));
            homensDia.add(r.funcionarioId + '|' + keyDia(r.data));
        }
    }));
    const tHomemDia = homensDia.size > 0 ? pesoEquipe30 / homensDia.size : 0;

    return { serie, ritmoKgDia, ritmoKgDiaCal, tHomemDia, diasAtivos: diasAtivos.size, homensDia: homensDia.size };
}

                        Criar Nova Obra
                    </button>
                </div>
            </div>
        `;
        return;
    }
    
    const resumo = calcularResumo(obra.pecas);
    const totais = calcularTotais(obra.pecas);
    const pesoTotal = obra.pecas.reduce((a, p) => a + (p.peso || 0), 0);

    // ---- Físico (ponderado por PESO) ----
    const pesoPorProc = {};
    PROCESSOS.forEach(p => pesoPorProc[p.id] = 0);
    obra.pecas.forEach(p => pesoPorProc[p.processo || 'AGUARDANDO'] += (p.peso || 0));
    const pesoExpedido = pesoPorProc['EXPEDIDO'] || 0;
    const pesoAguardando = pesoPorProc['AGUARDANDO'] || 0;
    const pesoEmProducao = (pesoPorProc['CORTE']||0) + (pesoPorProc['FABRICACAO']||0) + (pesoPorProc['SOLDA']||0) + (pesoPorProc['PINTURA']||0);
    const pesoFabricado = pesoEmProducao + pesoExpedido;
    const pctFisico = pesoTotal > 0 ? (pesoExpedido / pesoTotal * 100) : 0;
    const pesoRestante = pesoTotal - pesoExpedido;

    // ---- Financeiro (preços) ----
    const fin = obra.financeiro || {};
    const valorKg = fin.valorKg || 2.50;
    const orcamento = (fin.orcamento && fin.orcamento > 0) ? fin.orcamento : pesoTotal * valorKg;
    const medicoes = obra.medicoes || [];
    const totalMedido = medicoes.reduce((a, m) => a + (m.valor || 0), 0);
    const recebido = medicoes.filter(m => m.status === 'PAGO').reduce((a, m) => a + (m.valor || 0), 0);
    const vencido = medicoes.filter(isVencida).reduce((a, m) => a + (m.valor || 0), 0);
    const aReceber = medicoes.filter(m => m.status === 'PENDENTE' && !isVencida(m)).reduce((a, m) => a + (m.valor || 0), 0);
    const valorFabricado = pesoFabricado * valorKg;
    const aFaturar = Math.max(0, valorFabricado - totalMedido);
    const saldoContrato = Math.max(0, orcamento - totalMedido);
    const pctFaturado = orcamento > 0 ? (totalMedido / orcamento * 100) : 0;
    // Margem real (custo de produção via custoKg)
    const custoKg = fin.custoKg || 0;
    const custoFabricado = pesoFabricado * custoKg;
    const margemBruta = valorFabricado - custoFabricado;
    const margemPct = valorFabricado > 0 ? (margemBruta / valorFabricado * 100) : 0;

    // ---- Produtividade ----
    const prod = calcularProdutividadeObra(obra);
    const ritmoTDia = prod.ritmoKgDia / 1000;
    const tHomemDia = prod.tHomemDia / 1000;

    // ---- Prazo projetado ----
    let prazoTxt = '—', prazoCor = 'slate', prazoSub = 'sem ritmo registrado';
    const dataPrevista = fin.dataFim || obra.dataPrevisao;
    if (prod.ritmoKgDiaCal > 0 && pesoRestante > 0) {
        const diasRest = Math.ceil(pesoRestante / prod.ritmoKgDiaCal);
        const dataProj = new Date(Date.now() + diasRest * 86400000);
        prazoTxt = dataProj.toLocaleDateString('pt-BR');
        prazoSub = diasRest + ' dia(s) no ritmo atual';
        if (dataPrevista) {
            const deltaDias = Math.round((dataProj - new Date(dataPrevista)) / 86400000);
            if (deltaDias > 0) { prazoCor = 'red'; prazoSub = '+' + deltaDias + 'd vs previsão'; }
            else { prazoCor = 'emerald'; prazoSub = Math.abs(deltaDias) + 'd de folga'; }
        }
    } else if (pesoRestante <= 0 && pesoTotal > 0) {
        prazoTxt = 'Concluído'; prazoCor = 'emerald'; prazoSub = '100% expedido';
    }

    // ---- Alertas ----
    const alertas = [];
    if (vencido > 0) alertas.push({ icon: '🔴', txt: 'Medições vencidas: ' + formatMoeda(vencido) });
    if (prazoCor === 'red') alertas.push({ icon: '🟠', txt: 'Atraso projetado: ' + prazoSub });
    const procProd = [
        { nome: 'Corte', peso: pesoPorProc['CORTE'] || 0 },
        { nome: 'Fabricação', peso: pesoPorProc['FABRICACAO'] || 0 },
        { nome: 'Solda', peso: pesoPorProc['SOLDA'] || 0 },
        { nome: 'Pintura', peso: pesoPorProc['PINTURA'] || 0 }
    ].sort((a, b) => b.peso - a.peso);
    if (pesoEmProducao > 0 && procProd[0].peso / pesoEmProducao > 0.4)
        alertas.push({ icon: '🟠', txt: 'Gargalo em ' + procProd[0].nome + ': ' + formatPeso(procProd[0].peso) + ' parado(s)' });
    const soma7 = prod.serie.slice(7).reduce((a, s) => a + s.peso, 0);
    const somaPrev7 = prod.serie.slice(0, 7).reduce((a, s) => a + s.peso, 0);
    if (somaPrev7 > 0 && soma7 < somaPrev7 * 0.8)
        alertas.push({ icon: '🟡', txt: 'Ritmo em queda vs semana anterior' });
    if (aFaturar > 0)
        alertas.push({ icon: '🟡', txt: formatMoeda(aFaturar) + ' fabricados aguardando medição' });

    // ---- Dados por categoria (em PESO) ----
    const dadosCategorias = resumo.map(r => {
        const pecasCat = obra.pecas.filter(p => p.categoria === r.categoria);
        const peso = pecasCat.reduce((a, p) => a + (p.peso || 0), 0);
        const pesoExp = pecasCat.filter(p => p.processo === 'EXPEDIDO').reduce((a, p) => a + (p.peso || 0), 0);
        const pesoProd = pecasCat.filter(p => ['CORTE', 'FABRICACAO', 'SOLDA', 'PINTURA'].includes(p.processo)).reduce((a, p) => a + (p.peso || 0), 0);
        const info = getCategoriaInfo(r.categoria);
        return { categoria: r.categoria, peso, pesoExp, pesoProd, cor: info.cor, icon: info.icon };
    });

    // ---- Cards ----
    const semaforoMap = { red: 'text-red-400', orange: 'text-amber-400', emerald: 'text-emerald-400', slate: 'text-slate-100' };
    const kpisProducao = [
        { label: 'Avanço Físico', valor: pctFisico.toFixed(0) + '%', sub: formatPeso(pesoExpedido) + ' / ' + formatPeso(pesoTotal), bar: pctFisico, barCor: '#10b981', icon: '📈' },
        { label: 'Ritmo', valor: ritmoTDia.toFixed(1) + ' t/dia', sub: prod.diasAtivos + ' dia(s) ativos (30d)', spark: true, icon: '⚡' },
        { label: 't / homem-dia', valor: tHomemDia.toFixed(2) + ' t', sub: prod.homensDia + ' homem-dia (30d)', icon: '👷' },
        { label: 'Prazo Projetado', valor: prazoTxt, sub: prazoSub, semaforo: prazoCor, icon: '📅' }
    ];
    const kpisPrecos = [
        { label: 'Valor Fabricado', valor: formatMoeda(valorFabricado), sub: formatPeso(pesoFabricado) + ' × ' + formatMoeda(valorKg) + '/kg', stack: [{v: totalMedido, c: '#06b6d4'}, {v: aFaturar, c: '#3b82f6'}], total: valorFabricado, icon: '🏭' },
        { label: 'A Faturar', valor: formatMoeda(aFaturar), sub: 'pronto p/ medição', destaque: true, icon: '💰' },
        { label: 'A Receber / Vencido', valor: formatMoeda(aReceber), sub: vencido > 0 ? formatMoeda(vencido) + ' vencido' : 'sem vencidos', subCor: vencido > 0 ? 'text-red-400' : 'text-slate-400', stack: [{v: recebido, c: '#10b981'}, {v: aReceber, c: '#f59e0b'}, {v: vencido, c: '#ef4444'}], total: recebido + aReceber + vencido, icon: '📥' },
        { label: 'Saldo de Contrato', valor: formatMoeda(saldoContrato), sub: pctFaturado.toFixed(0) + '% faturado', bar: pctFaturado, barCor: '#06b6d4', icon: '📊' }
    ];
    const cardKpi = (k) => `
        <div class="bg-slate-800/50 rounded-xl p-3 border border-slate-700 ${k.destaque ? 'ring-1 ring-emerald-500/40' : ''}">
            <div class="flex items-center justify-between mb-1">
                <p class="text-[10px] text-slate-400 uppercase tracking-wide">${k.label}</p>
                <span class="text-sm">${k.icon}</span>
            </div>
            <p class="text-xl font-bold ${k.semaforo ? semaforoMap[k.semaforo] : (k.destaque ? 'text-emerald-400' : 'text-white')}">${k.valor}</p>
            <p class="text-[10px] ${k.subCor || 'text-slate-400'} mt-0.5 truncate">${k.sub}</p>
            ${k.bar !== undefined ? `<div class="h-1.5 bg-slate-700 rounded-full overflow-hidden mt-2"><div class="h-full rounded-full" style="width:${Math.min(k.bar, 100)}%;background:${k.barCor}"></div></div>` : ''}
            ${k.stack ? `<div class="h-1.5 bg-slate-700 rounded-full overflow-hidden mt-2 flex">${k.stack.map(s => `<div class="h-full" style="width:${k.total > 0 ? (s.v / k.total * 100) : 0}%;background:${s.c}"></div>`).join('')}</div>` : ''}
            ${k.spark ? `<div class="h-8 mt-1"><canvas id="spark-ritmo"></canvas></div>` : ''}
        </div>`;

    c.innerHTML = `
        <div class="space-y-4 fade-in">
            <!-- ====== FAIXA 1: VISÃO GERAL ====== -->
            <div>
                <div class="flex items-center gap-2 mb-2">
                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest">1 · Visão Geral</h3>
                    <div class="flex-1 h-px bg-slate-700"></div>
                </div>
                <div class="grid grid-cols-1 2xl:grid-cols-2 gap-4">
                    <div>
                        <p class="text-[10px] text-blue-400 font-semibold uppercase mb-1.5">🔧 Produção</p>
                        <div class="grid grid-cols-2 xl:grid-cols-4 gap-3">${kpisProducao.map(cardKpi).join('')}</div>
                    </div>
                    <div>
                        <p class="text-[10px] text-emerald-400 font-semibold uppercase mb-1.5">💰 Preços</p>
                        <div class="grid grid-cols-2 xl:grid-cols-4 gap-3">${kpisPrecos.map(cardKpi).join('')}</div>
                    </div>
                </div>
            </div>

            <!-- ====== FAIXA 2: ALERTAS ====== -->
            <div>
                <div class="flex items-center gap-2 mb-2">
                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest">2 · Alertas</h3>
                    <div class="flex-1 h-px bg-slate-700"></div>
                </div>
                <div class="flex flex-wrap gap-2">
                    ${alertas.length === 0
                        ? `<span class="text-sm text-emerald-400 bg-emerald-500/10 border border-emerald-500/30 rounded-lg px-3 py-1.5">🟢 Nenhum alerta — operação saudável</span>`
                        : alertas.map(a => `<span class="text-sm bg-slate-800/70 border border-slate-700 rounded-lg px-3 py-1.5">${a.icon} ${a.txt}</span>`).join('')}
                </div>
            </div>

            <!-- ====== FAIXA 3: TENDÊNCIA ====== -->
            <div>
                <div class="flex items-center gap-2 mb-2">
                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest">3 · Tendência</h3>
                    <div class="flex-1 h-px bg-slate-700"></div>
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <div class="col-span-2 bg-slate-800/50 rounded-xl p-4 border border-slate-700">
                        <div class="flex justify-between items-center mb-2">
                            <h4 class="text-sm font-semibold text-slate-400 uppercase">⚡ Produtividade Diária (t/dia)</h4>
                            <button onclick="navegar('financeiro')" class="text-xs text-blue-400 hover:text-blue-300">Curva S completa →</button>
                        </div>
                        <div class="h-56"><canvas id="chart-produtividade"></canvas></div>
                    </div>
                    <div class="bg-slate-800/50 rounded-xl p-4 border border-slate-700 flex flex-col">
                        <h4 class="text-sm font-semibold text-slate-400 mb-2 uppercase">🎯 Avanço Físico</h4>
                        <div class="flex-1 flex flex-col items-center justify-center">
                            <div class="relative">
                                <canvas id="chart-gauge-dash" width="160" height="90"></canvas>
                                <div class="absolute inset-0 flex items-center justify-center pt-4">
                                    <div class="text-center">
                                        <p class="text-3xl font-bold text-emerald-400">${pctFisico.toFixed(0)}%</p>
                                        <p class="text-[10px] text-slate-400">expedido</p>
                                    </div>
                                </div>
                            </div>
                            <div class="grid grid-cols-3 gap-2 mt-4 w-full text-center">
                                <div class="bg-slate-700/50 rounded-lg p-2"><p class="text-sm font-bold text-slate-300">${formatPeso(pesoAguardando)}</p><p class="text-[10px] text-slate-500">Aguard.</p></div>
                                <div class="bg-amber-500/20 rounded-lg p-2"><p class="text-sm font-bold text-amber-400">${formatPeso(pesoEmProducao)}</p><p class="text-[10px] text-slate-500">Produção</p></div>
                                <div class="bg-emerald-500/20 rounded-lg p-2"><p class="text-sm font-bold text-emerald-400">${formatPeso(pesoExpedido)}</p><p class="text-[10px] text-slate-500">Expedido</p></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ====== FAIXA 4: DETALHAMENTO ====== -->
            <div>
                <div class="flex items-center gap-2 mb-2">
                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest">4 · Detalhamento</h3>
                    <div class="flex-1 h-px bg-slate-700"></div>
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <div class="bg-slate-800/50 rounded-xl p-4 border border-slate-700">
                        <h4 class="text-sm font-semibold text-slate-400 mb-4 uppercase">🔄 WIP por Processo (t)</h4>
                        <div class="h-56"><canvas id="chart-wip-processo"></canvas></div>
                    </div>
                    <div class="bg-slate-800/50 rounded-xl p-4 border border-slate-700">
                        <h4 class="text-sm font-semibold text-slate-400 mb-4 uppercase">💧 Cascata de Preços</h4>
                        <div class="h-48"><canvas id="chart-cascata"></canvas></div>
                        ${custoKg > 0
                            ? `<p class="text-[11px] text-slate-400 mt-2 text-center">Custo ${formatMoeda(custoKg)}/kg · Margem bruta <span class="${margemBruta >= 0 ? 'text-emerald-400' : 'text-red-400'} font-bold">${formatMoeda(margemBruta)} (${margemPct.toFixed(0)}%)</span></p>`
                            : `<p class="text-[11px] text-slate-500 mt-2 text-center">Defina o <b>Custo (R$/kg)</b> em Config p/ ver a margem real</p>`}
                    </div>
                    <div class="bg-slate-800/50 rounded-xl p-4 border border-slate-700">
                        <div class="flex justify-between items-center mb-4">
                            <h4 class="text-sm font-semibold text-slate-400 uppercase">📋 Por Categoria</h4>
                            <button onclick="navegar('producao')" class="text-xs text-blue-400 hover:text-blue-300">Ver tudo →</button>
                        </div>
                        <div class="space-y-2 max-h-52 overflow-y-auto">
                            ${dadosCategorias.map(d => {
                                const pctExpP = d.peso > 0 ? (d.pesoExp / d.peso * 100) : 0;
                                const pctProdP = d.peso > 0 ? (d.pesoProd / d.peso * 100) : 0;
                                return `
                                    <div class="bg-slate-900/50 rounded-lg p-2">
                                        <div class="flex items-center justify-between text-xs mb-1">
                                            <span class="flex items-center gap-1"><span>${d.icon}</span><span class="font-medium">${d.categoria}</span></span>
                                            <span class="text-slate-400">${formatPeso(d.pesoExp)} / ${formatPeso(d.peso)}</span>
                                        </div>
                                        <div class="h-2 bg-slate-700 rounded-full overflow-hidden flex">
                                            <div class="h-full bg-emerald-500" style="width:${pctExpP}%"></div>
                                            <div class="h-full bg-amber-500" style="width:${pctProdP}%"></div>
                                        </div>
                                    </div>`;
                            }).join('')}
                        </div>
                    </div>
                </div>
            </div>

            <!-- Medições + Ações Rápidas -->
            ${renderSecaoMedicoesDashboard(obra)}
            <div class="grid grid-cols-4 gap-3">
                <button onclick="abrirImportacao()" class="bg-slate-800/50 hover:bg-slate-700/50 rounded-xl p-4 border border-slate-700 transition-all text-left card-hover"><span class="text-2xl">📥</span><p class="font-semibold mt-2">Importar Excel</p><p class="text-xs text-slate-400">Romaneio padrão</p></button>
                <button onclick="navegar('kanban')" class="bg-slate-800/50 hover:bg-slate-700/50 rounded-xl p-4 border border-slate-700 transition-all text-left card-hover"><span class="text-2xl">📋</span><p class="font-semibold mt-2">Kanban</p><p class="text-xs text-slate-400">Visualizar fluxo</p></button>
                <button onclick="navegar('diario')" class="bg-slate-800/50 hover:bg-slate-700/50 rounded-xl p-4 border border-slate-700 transition-all text-left card-hover"><span class="text-2xl">📝</span><p class="font-semibold mt-2">Diário</p><p class="text-xs text-slate-400">Acompanhamento</p></button>
                <button onclick="abrirExportacao()" class="bg-slate-800/50 hover:bg-slate-700/50 rounded-xl p-4 border border-slate-700 transition-all text-left card-hover"><span class="text-2xl">📤</span><p class="font-semibold mt-2">Exportar</p><p class="text-xs text-slate-400">PDF / Excel</p></button>
            </div>
        </div>
    `;

    // ==================== GRÁFICOS ====================
    setTimeout(() => {
        // Sparkline do ritmo (dentro do card)
        const ctxSpark = document.getElementById('spark-ritmo');
        if (ctxSpark) {
            charts.spark = new Chart(ctxSpark, {
                type: 'line',
                data: { labels: prod.serie.map(s => s.label), datasets: [{ data: prod.serie.map(s => s.peso / 1000), borderColor: '#fbbf24', borderWidth: 2, fill: true, backgroundColor: 'rgba(251,191,36,0.15)', tension: 0.35, pointRadius: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { enabled: false } }, scales: { x: { display: false }, y: { display: false } } }
            });
        }
        // Gauge de avanço físico
        const ctxGauge = document.getElementById('chart-gauge-dash');
        if (ctxGauge) {
            charts.gaugeDash = new Chart(ctxGauge, {
                type: 'doughnut',
                data: { datasets: [{ data: [pctFisico, 100 - pctFisico], backgroundColor: ['#10b981', '#1e293b'], borderWidth: 0 }] },
                options: { responsive: false, cutout: '75%', rotation: -90, circumference: 180, plugins: { legend: { display: false }, tooltip: { enabled: false } } }
            });
        }
        // Produtividade diária (barras + média móvel 7d)
        const ctxProd = document.getElementById('chart-produtividade');
        if (ctxProd) {
            const dados = prod.serie.map(s => s.peso / 1000);
            const mm = dados.map((_, i) => { const w = dados.slice(Math.max(0, i - 6), i + 1); return w.reduce((a, b) => a + b, 0) / w.length; });
            charts.produtividade = new Chart(ctxProd, {
                data: { labels: prod.serie.map(s => s.label), datasets: [
                    { type: 'bar', label: 't/dia', data: dados, backgroundColor: '#3b82f6', borderRadius: 3 },
                    { type: 'line', label: 'Média 7d', data: mm, borderColor: '#fbbf24', borderWidth: 2, tension: 0.35, pointRadius: 0 }
                ] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', boxWidth: 12, padding: 12, font: { size: 10 } } } }, scales: { x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 9 } } }, y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8', callback: v => v.toFixed(1) + 't' } } } }
            });
        }
        // WIP por processo (barras horizontais em toneladas)
        const ctxWip = document.getElementById('chart-wip-processo');
        if (ctxWip) {
            const procs = PROCESSOS.filter(p => p.id !== 'EXPEDIDO');
            charts.wip = new Chart(ctxWip, {
                type: 'bar',
                data: { labels: procs.map(p => p.nome), datasets: [{ data: procs.map(p => (pesoPorProc[p.id] || 0) / 1000), backgroundColor: procs.map(p => p.cor), borderRadius: 4 }] },
                options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { color: '#334155' }, ticks: { color: '#94a3b8', callback: v => v.toFixed(1) + 't' } }, y: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 10 } } } } }
            });
        }
        // Cascata de preços (orçamento → fabricado → medido → recebido)
        const ctxCasc = document.getElementById('chart-cascata');
        if (ctxCasc) {
            const passos = [
                { l: 'Orçamento', v: orcamento, c: '#64748b' },
                { l: 'Fabricado', v: valorFabricado, c: '#3b82f6' },
                { l: 'Medido', v: totalMedido, c: '#06b6d4' },
                { l: 'Recebido', v: recebido, c: '#10b981' }
            ];
            if (custoKg > 0) passos.push({ l: 'Custo', v: custoFabricado, c: '#ef4444' });
            charts.cascata = new Chart(ctxCasc, {
                type: 'bar',
                data: { labels: passos.map(p => p.l), datasets: [{ data: passos.map(p => p.v), backgroundColor: passos.map(p => p.c), borderRadius: 4 }] },
                options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => formatMoeda(ctx.raw) } } }, scales: { x: { grid: { color: '#334155' }, ticks: { color: '#94a3b8', callback: v => v >= 1e6 ? (v / 1e6).toFixed(1) + 'mi' : (v / 1e3).toFixed(0) + 'k' } }, y: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 11 } } } } }
            });
        }
    }, 50);
}

// ==================== KANBAN ====================
function renderKanban(c, obra) {
    if (!obra || obra.pecas.length === 0) {
        c.innerHTML = `
            <div class="h-full flex items-center justify-center">
                <div class="text-center">
                    <div class="text-5xl mb-4">📋</div>
                    <h2 class="text-xl font-bold mb-2">Kanban Vazio</h2>

function filtrarCategoria(cat) {
    filtroCategoria = cat;
    renderPagina();
}

function filtrarTabela() {
    const obra = getObraAtiva();
    if (!obra) return;
    
    const busca = (document.getElementById('busca-peca')?.value || '').toLowerCase();
    const procFiltro = document.getElementById('filtro-processo')?.value || 'TODOS';
    
    let pecas = obra.pecas.filter(p => {
        if (filtroCategoria !== 'TODAS' && p.categoria !== filtroCategoria) return false;
        if (procFiltro !== 'TODOS' && p.processo !== procFiltro) return false;
        if (busca && !p.marca.toLowerCase().includes(busca) && !p.tipo.toLowerCase().includes(busca)) return false;
        return true;
    });
    
    const tbody = document.getElementById('tabela-body');
    if (!tbody) return;
    
    tbody.innerHTML = pecas.slice(0, 200).map(p => {
        const catInfo = getCategoriaInfo(p.categoria);
        const procInfo = getProcessoInfo(p.processo);
        
        // Formatar notas para exibição
        let notasExibir = '-';
        if (p.notas && p.notas.length > 0) {
            const ultimasNotas = p.notas.slice(-2).map(n => {
                let texto = n.funcionario || n.texto || '';
                if (n.qtd) texto += ` ${n.qtd}pç`;
                if (n.data) texto += ` ${n.data}`;
                return texto;
            });
            notasExibir = `<span class="text-amber-400 text-xs">${ultimasNotas.join('<br>')}</span>`;
            if (p.notas.length > 2) {
                notasExibir += `<span class="text-slate-500 text-xs"> +${p.notas.length - 2}</span>`;
            }
        }
        
        return `
            <tr class="border-t border-slate-700/50 hover:bg-slate-800/50">
                <td class="py-2 px-3">
                    <input type="checkbox" class="peca-check rounded" data-id="${p.id}"/>
                </td>
                <td class="py-2 px-3 font-mono font-bold">${p.marca}</td>
                <td class="py-2 px-3 text-slate-300">${p.tipo}</td>
                <td class="py-2 px-3">
                    <span class="px-2 py-0.5 rounded text-xs" style="background:${catInfo.cor}30;color:${catInfo.cor}">
                        ${p.categoria}
                    </span>
                </td>
                <td class="py-2 px-3 text-center">${p.qtd}</td>
                <td class="py-2 px-3 text-right">${formatPeso(p.peso)}</td>
                <td class="py-2 px-3 text-center">
                    <span class="px-2 py-0.5 rounded-full text-xs" style="background:${procInfo.cor}30;color:${procInfo.cor}">
                        ${procInfo.icon} ${procInfo.nome}
                    </span>
                </td>
                <td class="py-2 px-3 text-left max-w-[200px]">${notasExibir}</td>
                <td class="py-2 px-3 text-center">
                    <button onclick="abrirPeca(${p.id})" class="bg-blue-600/20 hover:bg-blue-600/40 text-blue-400 px-2 py-1 rounded text-xs">
                        ✏️
                    </button>
                </td>
            </tr>
        `;
    }).join('');
    
    if (pecas.length > 200) {
        tbody.innerHTML += `<tr><td colspan="9" class="py-3 text-center text-slate-500">Mostrando 200 de ${pecas.length} peças</td></tr>`;
    }
}

function toggleAllChecks(checked) {
    document.querySelectorAll('.peca-check').forEach(cb => cb.checked = checked);
}

            <!-- Listas por Processo -->
